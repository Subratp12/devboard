name: CI

on: 
  push:
    branches: [advanced]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup NodeJs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
            
      - name: Install npm Packages
        run: npm install
        working-directory: frontend

      - name: Run Linter
        run: npm run lint
        working-directory: frontend

      - name: Run Tests
        run: npm run test 
        working-directory: frontend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Ensure ECR repo exists (Frontend)
        run: |
          aws ecr describe-repositories --repository-names devboard-frontend --region ap-south-1 \
          || aws ecr create-repository --repository-name devboard-frontend --region ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image (Frontend)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: 394624472906.dkr.ecr.ap-south-1.amazonaws.com/devboard-frontend:latest

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache-dependency-path: go.sum
            
      - name: Run Go Formatter
        run: go fmt
        working-directory: backend

      - name: Run Go Vet
        run: go vet
        working-directory: backend
            
      - name: Run Tests
        run: go test ./...
        working-directory: backend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Ensure ECR repo exists (Backend)
        run: |
          aws ecr describe-repositories --repository-names devboard-backend --region ap-south-1 \
          || aws ecr create-repository --repository-name devboard-backend --region ap-south-1

      - name: Login to Aws ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image (Backend)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: 394624472906.dkr.ecr.ap-south-1.amazonaws.com/devboard-backend:latest

  deploy:
    needs: [frontend, backend]
    uses: ./.github/workflows/cd.yml
    secrets: inherit